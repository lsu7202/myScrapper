version: '3.8'

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15-alpine
    container_name: audit_db
    environment:
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_pass
      POSTGRES_DB: audit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audit_network

  # 중앙 서버
  central-server:
    build:
      context: .
      dockerfile: Dockerfile.central
    container_name: audit_central
    environment:
      DATABASE_URL: postgresql://audit_user:audit_pass@postgres:5432/audit_db
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./central_server:/app/central_server
      - ./db_models:/app/db_models
      - ./:/app/shared
    networks:
      - audit_network
    command: python central_server/main.py

  # 워커 서버 1
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: audit_worker_1
    environment:
      DATABASE_URL: postgresql://audit_user:audit_pass@postgres:5432/audit_db
      CENTRAL_SERVER_URL: http://central-server:8000
      WORKER_ID: worker-001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      central-server:
        condition: service_started
    volumes:
      - ./worker_server:/app/worker_server
      - ./db_models:/app/db_models
    networks:
      - audit_network
    command: python worker_server/main.py

  # 워커 서버 2
